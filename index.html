<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BA Quiz Passing Marks Calculator</title>
    <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
    <style>
        body {
            background: linear-gradient(to right, #e0f2fe, #c7d2fe);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Arial', sans-serif;
            padding: 16px;
        }
        .container {
            background: white;
            padding: 32px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 600px;
            box-sizing: border-box;
        }
        h1 {
            font-size: 28px;
            font-weight: bold;
            color: #1e40af;
            text-align: center;
            margin-bottom: 16px;
            line-height: 1.2;
        }
        p.instructions {
            font-size: 16px;
            color: #4b5563;
            text-align: center;
            margin-bottom: 24px;
            line-height: 1.4;
        }
        .input-group {
            margin-bottom: 24px;
        }
        label {
            display: block;
            font-size: 16px;
            color: #1f2937;
            font-weight: 500;
            margin-bottom: 8px;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.2s, box-shadow 0.2s;
            box-sizing: border-box;
        }
        input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }
        input::placeholder {
            color: #9ca3af;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background: #2563eb;
        }
        .error {
            color: #dc2626;
            font-size: 14px;
            text-align: center;
            margin-top: 16px;
            animation: fadeIn 0.5s ease-in;
        }
        .result {
            margin-top: 24px;
            padding: 16px;
            background: #f9fafb;
            border-radius: 8px;
            animation: fadeIn 0.5s ease-in;
        }
        .result h2 {
            font-size: 20px;
            font-weight: 600;
            color: #1f2937;
            margin-bottom: 8px;
        }
        .result p {
            font-size: 16px;
            color: #1f2937;
            margin: 4px 0;
        }
        .result p span {
            font-weight: bold;
        }
        .congrats {
            color: #16a34a;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
        }
        .motivation {
            color: #d97706;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
        }
        .note {
            font-size: 12px;
            color: #6b7280;
            margin-top: 12px;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @media (max-width: 768px) {
            .container {
                max-width: 500px;
                padding: 24px;
            }
            h1 {
                font-size: 24px;
            }
            p.instructions {
                font-size: 14px;
            }
            label, input, button {
                font-size: 15px;
            }
            .result h2 {
                font-size: 18px;
            }
            .result p {
                font-size: 14px;
            }
            .error, .congrats, .motivation {
                font-size: 13px;
            }
        }
        @media (max-width: 400px) {
            .container {
                max-width: 400px;
                padding: 16px;
            }
            h1 {
                font-size: calc(5.5vw);
                min: 20px;
                max: 24px;
            }
            p.instructions {
                font-size: 13px;
            }
            label {
                font-size: 14px;
            }
            input, button {
                padding: 8px;
                font-size: 14px;
            }
            .result h2 {
                font-size: 17px;
            }
            .result p {
                font-size: 13px;
            }
            .error, .congrats, .motivation {
                font-size: 12px;
            }
            .note {
                font-size: 10px;
            }
        }
        @media (max-width: 320px) {
            .container {
                padding: 12px;
            }
            h1 {
                font-size: calc(5vw);
            }
            input, button {
                padding: 6px;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script>
        // Note: In production, bundle with Vite/Webpack to avoid CDN and optimize.
        const { useState } = React;

        function App() {
            const [quiz1, setQuiz1] = useState('');
            const [result, setResult] = useState(null);
            const [error, setError] = useState('');

            const calculateMinMarks = () => {
                setError('');
                setResult(null);

                const qz1Scaled = parseFloat(quiz1);
                if (isNaN(qz1Scaled) || qz1Scaled < 0 || qz1Scaled > 100) {
                    setError('Please enter a valid Quiz 1 score between 0 and 100.');
                    return;
                }

                const qz1 = qz1Scaled / 5; // Convert to original 20-mark scale
                let qz2;

                // Lookup table for exact Quiz 2 values from provided table
                const table = {
                    0: 10,
                    10: 9.2,
                    15: 8.8,
                    20: 8.4,
                    25: 8,
                    30: 7.6,
                    35: 7,
                    40: 4.8,
                    50: 0
                };

                if (table[qz1Scaled] !== undefined) {
                    qz2 = table[qz1Scaled];
                } else {
                    // Calculate for other values
                    const qz2Case1 = (7 - 0.3 * qz1) / 0.7; // Qz2 >= Qz1
                    const qz2Case2 = (7 - 0.7 * qz1) / 0.3; // Qz1 >= Qz2
                    qz2 = Math.min(qz2Case1, qz2Case2);
                    qz2 = Math.max(0, Math.min(20, qz2)); // Cap between 0 and 20
                }

                const qz2Scaled = qz2 * 5; // Scale to 100
                const endTermScaled = 25; // Fixed at 10/40 * 100

                setResult({ qz2: qz2Scaled, endTerm: endTermScaled });
            };

            return React.createElement(
                'div',
                { className: 'container' },
                React.createElement('h1', null, 'BA Quiz Passing Marks Calculator'),
                React.createElement(
                    'p',
                    { className: 'instructions' },
                    'Enter your Quiz 1 score (out of 100) to find the minimum Quiz 2 score needed to be eligible for the Business Analytics final exam. You must also submit at least one of the first two assignments.'
                ),
                React.createElement(
                    'div',
                    { className: 'input-group' },
                    React.createElement('label', { htmlFor: 'quiz1' }, 'Quiz 1 Score (0–100):'),
                    React.createElement('input', {
                        type: 'number',
                        id: 'quiz1',
                        value: quiz1,
                        onChange: (e) => setQuiz1(e.target.value),
                        min: '0',
                        max: '100',
                        step: '0.1',
                        placeholder: 'e.g., 75'
                    })
                ),
                React.createElement(
                    'button',
                    { onClick: calculateMinMarks },
                    'Calculate Minimum Marks'
                ),
                error && React.createElement('p', { className: 'error' }, error),
                result && React.createElement(
                    'div',
                    { className: 'result' },
                    result.qz2 === 0 && React.createElement(
                        'p',
                        { className: 'congrats' },
                        '🎉 Congratulations! Your Quiz 1 score is sufficient to meet the quiz requirement!'
                    ),
                    quiz1 < 20 && React.createElement(
                        'p',
                        { className: 'motivation' },
                        '💪 Your Quiz 1 score is low, but don’t worry! Study hard for Quiz 2 and the End Term to secure your eligibility.'
                    ),
                    React.createElement('h2', null, 'Minimum Marks Required:'),
                    React.createElement('p', null, 'Quiz 2: ', React.createElement('span', null, result.qz2.toFixed(1), ' / 100')),
                    React.createElement('p', null, 'End Term: ', React.createElement('span', null, result.endTerm, ' / 100')),
                    React.createElement(
                        'p',
                        { className: 'note' },
                        'Note: Submit at least one of Asgn 1 or Asgn 2 and attend the End Term exam to be eligible for a final course grade.'
                    )
                )
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
    </script>
</body>
</html>
